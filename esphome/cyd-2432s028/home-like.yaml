# Two SPI buses used by the CYD:
# - lcd: built-in display
# - my_touchscreen: built-in touch controller
spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: my_touchscreen
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm

  - platform: ledc
    id: output_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: output_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: output_blue
    pin: GPIO17
    inverted: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Power Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

  - platform: rgb
    name: LED
    red: output_red
    id: led
    green: output_green
    blue: output_blue
    restore_mode: ALWAYS_OFF

# Touchscreen configuration (XPT2046)
# IMPORTANT:
# - calibration values are device-specific
# - touchscreen.transform must match display.transform exactly
touchscreen:
  platform: xpt2046
  id: ts_touch
  spi_id: my_touchscreen
  cs_pin: 33
  interrupt_pin: 36
  update_interval: 20ms
  threshold: 300

  calibration:
    x_min: ${TOUCH_CAL_X_MIN}
    x_max: ${TOUCH_CAL_X_MAX}
    y_min: ${TOUCH_CAL_Y_MIN}
    y_max: ${TOUCH_CAL_Y_MAX}

  transform:
    swap_xy: ${TOUCH_SWAP_XY}
    mirror_x: ${TOUCH_MIRROR_X}
    mirror_y: ${TOUCH_MIRROR_Y}

  on_touch:
    - lambda: |-
        id(last_touch_ms) = millis();

# Display configuration (ILI9341)
display:
  - platform: ili9xxx
    id: my_display
    spi_id: lcd
    model: ILI9341
    color_palette: 8BIT
    cs_pin: 15
    dc_pin: 2
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false

    transform:
      swap_xy: ${DISPLAY_SWAP_XY}
      mirror_x: ${DISPLAY_MIRROR_X}
      mirror_y: ${DISPLAY_MIRROR_Y}

    dimensions:
      width: ${DISPLAY_W}
      height: ${DISPLAY_H}

