            x: 11
            y: ${HEADER_Y}
            text: "${ROOM_NAME}"
            styles: style_room

        - label:
            id: lbl_time
            align: TOP_RIGHT
            x: -11
            y: ${HEADER_Y}
            text: ""
            styles: style_time

        # ---------- TILE 1 ----------
        - obj:
            id: tile1
            x: ${GRID_COL1_X}
            y: ${GRID_ROW1_Y}
            width: ${TILE_W}
            height: ${TILE_H}
            styles: style_tile
            scrollable: false
            scrollbar_mode: 'OFF'
            widgets:
              - obj:
                  id: tile1_icon_circle
                  x: ${TILE_ICON_X}
                  y: ${TILE_ICON_Y}
                  width: 36
                  height: 36
                  styles: style_icon_circle
                  clickable: false
                  scrollable: false
                  scrollbar_mode: 'OFF'
                  widgets:
                    - label:
                        id: tile1_icon_lbl
                        align: CENTER
                        text_font: materialdesign_icons
                        text_color: 0xFFFFFF
                        text: "${TILE1_ICON}"
                        clickable: false
              - label:
                  id: t1_title
                  x: ${TILE_TITLE_X}
                  y: ${TILE_TITLE_Y}
                  text: "${TILE1_TITLE}"
                  styles: style_title
                  clickable: false
              - label:
                  id: t1_value
                  x: ${TILE_VALUE_X}
                  y: ${TILE_VALUE_Y}
