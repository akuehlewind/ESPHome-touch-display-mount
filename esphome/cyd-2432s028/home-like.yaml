                                                    data:
                                                      entity_id: !lambda 'return entity_id;'
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: |-
                                                        return tile_type == "light";
                                                    then:
                                                      - homeassistant.action:
                                                          action: light.turn_on
                                                          data:
                                                            entity_id: !lambda 'return entity_id;'
                                                    else:
