switch:
  - platform: restart
    name: "Restart"

# Two SPI buses:
# - lcd: display
# - my_touchscreen: touch controller
spi:
  - id: lcd
    clk_pin: 18
    mosi_pin: 23

  - id: my_touchscreen
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 35

output:
  - platform: ledc
    pin: 4
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Power Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

# Touchscreen configuration (XPT2046)
# IMPORTANT:
# - calibration values are device-specific
# - touchscreen.transform must match display.transform exactly
touchscreen:
  platform: xpt2046
  id: ts_touch
  spi_id: my_touchscreen
  cs_pin: 33
  interrupt_pin: 34
  update_interval: 20ms
  threshold: 300

  calibration:
    x_min: ${TOUCH_CAL_X_MIN}
    x_max: ${TOUCH_CAL_X_MAX}
    y_min: ${TOUCH_CAL_Y_MIN}
    y_max: ${TOUCH_CAL_Y_MAX}

  transform:
    swap_xy: ${TOUCH_SWAP_XY}
    mirror_x: ${TOUCH_MIRROR_X}
    mirror_y: ${TOUCH_MIRROR_Y}

  on_touch:
    - lambda: |-
        id(last_touch_ms) = millis();

# Display configuration (ILI9341)
display:
  - platform: mipi_spi
    id: my_display
    spi_id: lcd
    model: ILI9341
    cs_pin: 27
    dc_pin: 26
    reset_pin: 16
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false

    transform:
      swap_xy: ${DISPLAY_SWAP_XY}
      mirror_x: ${DISPLAY_MIRROR_X}
      mirror_y: ${DISPLAY_MIRROR_Y}

    dimensions:
      width: ${DISPLAY_W}
      height: ${DISPLAY_H}

lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: ts_touch

  style_definitions:
    - id: style_tile
      bg_color: 0xFFFFFF
      bg_opa: 95%
      radius: 18
      border_width: 0
      pad_left: 8
      pad_right: 8
      pad_top: 8
      pad_bottom: 8
      shadow_width: 0
      shadow_opa: 40%

    - id: style_tile_disabled
      bg_color: 0x939391
      bg_opa: 95%
      radius: 18
      border_width: 0
      pad_left: 8
      pad_right: 8
      pad_top: 8
      pad_bottom: 8
      shadow_width: 0
      shadow_opa: 25%

    - id: style_icon_circle
      bg_color: 0xFEC600
      bg_opa: COVER
      radius: 999
      border_width: 0

    - id: style_icon_circle_disabled
      bg_color: 0x7B7B6F
      bg_opa: 95%
      radius: 999
      border_width: 0

    - id: style_room
      text_font: headline
      text_color: 0xFFFFFF
      text_opa: 100%

    - id: style_time
      text_font: time_label
      text_color: 0xFFFFFF
      text_opa: 100%

    - id: style_title
      text_font: label
      text_color: 0x000000
      text_opa: 100%

    - id: style_value
      text_font: sublabel
      text_color: 0x7A7A7C
      text_opa: 100%

    - id: style_value_big
      text_font: sublabel_big
      text_color: 0xFFFFFF
      text_opa: 80%

    - id: style_title_disabled
      text_font: label
      text_color: 0xFFFFFF
      text_opa: 100%

    - id: style_value_disabled
      text_font: sublabel
      text_color: 0xD9D9D9
      text_opa: 100%

  pages:
    - id: home_page
      bg_color: 0x000000
      bg_opa: COVER
      scrollable: false
      scrollbar_mode: 'OFF'
      widgets:
        - image:
            id: bg
            src: bg_home
            x: 0
            y: 0

        - label:
            id: lbl_room
            x: 11
            y: ${HEADER_Y}
            text: "${ROOM_NAME}"
            styles: style_room

        - label:
            id: lbl_time
            align: TOP_RIGHT
            x: -11
            y: ${HEADER_Y}
            text: ""
            styles: style_time

        # ---------- TILE 1 ----------
        - obj:
            id: tile1
            x: ${GRID_COL1_X}
            y: ${GRID_ROW1_Y}
            width: ${TILE_W}
            height: ${TILE_H}
            styles: style_tile
            scrollable: false
            scrollbar_mode: 'OFF'
            widgets:
              - obj:
                  id: tile1_icon_circle
                  x: ${TILE_ICON_X}
                  y: ${TILE_ICON_Y}
                  width: 36
                  height: 36
                  styles: style_icon_circle
                  clickable: false
                  scrollable: false
                  scrollbar_mode: 'OFF'
                  widgets:
                    - label:
                        id: tile1_icon_lbl
                        align: CENTER
                        text_font: materialdesign_icons
                        text_color: 0xFFFFFF
                        text: "${TILE1_ICON}"
                        clickable: false
              - label:
                  id: t1_title
                  x: ${TILE_TITLE_X}
                  y: ${TILE_TITLE_Y}
                  text: "${TILE1_TITLE}"
                  styles: style_title
                  clickable: false
