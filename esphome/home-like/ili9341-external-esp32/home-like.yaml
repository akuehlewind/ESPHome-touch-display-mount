              - script.execute: wake_display

script:
  - id: wake_display
    mode: restart
    then:
      - lambda: |-
          id(last_touch_ms) = millis();
          id(display_dimmed) = false;
      - light.turn_on:
          id: back_light
          brightness: !lambda "return atoi(\"${MAX_BRIGHTNESS}\") / 100.0f;"
      - lvgl.widget.hide: dim_wake_overlay
      - lvgl.widget.hide: color_detail_overlay
      - lvgl.widget.hide: climate_detail_overlay

  - id: dim_display
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return std::string("${AUTO_DIM}") == "true";'
          then:
            - lambda: |-
                int dim_value = atoi("${DIM_BRIGHTNESS}");
                int max_value = atoi("${MAX_BRIGHTNESS}");

                if (std::string("${NIGHT_MODE}") == "true") {
                  auto now = id(homeassistant_time).now();
                  int hour = now.hour;
                  int start_hour = atoi("${NIGHT_START_HOUR}");
                  int end_hour = atoi("${NIGHT_END_HOUR}");
                  bool is_night = false;
                  if (start_hour < end_hour) {
                    is_night = (hour >= start_hour && hour < end_hour);
                  } else {
                    is_night = (hour >= start_hour || hour < end_hour);
                  }
                  if (is_night) {
                    dim_value = atoi("${NIGHT_DIM_BRIGHTNESS}");
                  }
                }

                id(back_light).turn_on().set_brightness(dim_value / 100.0f).perform();

                // Always mark as dimmed to stop the interval from re-firing
                id(display_dimmed) = true;
                // Only show the touch-blocking overlay when brightness actually changes
                if (dim_value < max_value) {
                  lv_obj_clear_flag(id(dim_wake_overlay), LV_OBJ_FLAG_HIDDEN);
                }

  - id: publish_action
    mode: queued
    parameters:
      action: string
    then:
      - logger.log:
          level: INFO
          format: "publish_action: %s"
          args: ["action.c_str()"]
      - text_sensor.template.publish:
          id: smartdisplay_action
          state: !lambda 'return action;'
      - delay: 500ms
      - text_sensor.template.publish:
          id: smartdisplay_action
          state: ""

  - id: climate_target_preview
    parameters:
      value: int
    then:
      - lambda: |-
          int min_x10 = id(active_climate_min_x10);
          int max_x10 = id(active_climate_max_x10);
          if (value < min_x10) value = min_x10;
          if (value > max_x10) value = max_x10;
          int step_x10 = id(active_climate_step_x10);
          if (step_x10 < 5) step_x10 = 5;
          value = min_x10 + (int) lround((value - min_x10) / (float) step_x10) * step_x10;
          if (value < min_x10) value = min_x10;
          if (value > max_x10) value = max_x10;
          id(active_climate_target_x10) = value;

          char buf[16];
          snprintf(buf, sizeof(buf), "%.1fВ°", value / 10.0f);
          lv_label_set_text(id(climate_target_label), buf);
          lv_arc_set_value(id(climate_arc), value);

  - id: climate_target_commit
    parameters:
      value: int
    then:
      - script.execute:
          id: climate_target_preview
          value: !lambda "return value;"
      - if:
          condition:
            lambda: 'return std::string("${DIRECT_ACTIONS}") == "true";'
          then:
            - homeassistant.action:
                action: climate.set_temperature
                data:
                  entity_id: !lambda "return id(active_entity);"
                  temperature: !lambda "return value / 10.0f;"

  - id: climate_adjust_target
    parameters:
      direction: int
    then:
      - lambda: |-
          int step_x10 = id(active_climate_step_x10);
          if (step_x10 < 5) step_x10 = 5;
          int next = id(active_climate_target_x10) + (direction * step_x10);
          if (next < id(active_climate_min_x10)) next = id(active_climate_min_x10);
          if (next > id(active_climate_max_x10)) next = id(active_climate_max_x10);
          id(active_climate_target_x10) = next;
      - script.execute:
          id: climate_target_commit
          value: !lambda "return id(active_climate_target_x10);"

  - id: climate_cycle_mode
    mode: restart
    then:
      - lambda: |-
          auto lower = [](std::string value) {
            for (char &c : value) {
              if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
            }
            return value;
          };
          auto label_for = [](const std::string& mode) {
            if (mode == "off") return std::string("Off");
            if (mode == "heat") return std::string("Heat");
            if (mode == "cool") return std::string("Cool");
            if (mode == "heat_cool") return std::string("Heat/Cool");
            if (mode == "auto") return std::string("Auto");
            if (mode == "dry") return std::string("Dry");
            if (mode == "fan_only") return std::string("Fan");
            return mode.empty() ? std::string("Auto") : mode;
          };

          std::string supported = lower(id(active_climate_supported_modes));
          std::string current = lower(id(active_climate_mode));
          const char* order[] = {"off", "heat", "cool", "heat_cool", "auto", "dry", "fan_only"};
          const int count = sizeof(order) / sizeof(order[0]);

          auto supported_mode = [&](const std::string& mode) {
            std::string single_quoted = "'" + mode + "'";
            std::string double_quoted = "\"" + mode + "\"";
            return supported.empty() || supported == mode ||
                   supported.find(single_quoted) != std::string::npos ||
                   supported.find(double_quoted) != std::string::npos;
          };

          int current_index = -1;
          for (int i = 0; i < count; i++) {
            if (current == order[i]) {
              current_index = i;
              break;
            }
          }

          std::string next = "";
          for (int offset = 1; offset <= count; offset++) {
            int idx = (current_index + offset + count) % count;
            if (supported_mode(order[idx])) {
              next = order[idx];
              break;
            }
          }

          if (next.empty()) next = current.empty() ? std::string("auto") : current;
          id(active_climate_mode) = next;
          lv_label_set_text(id(climate_mode_label), label_for(next).c_str());
      - if:
          condition:
            lambda: 'return std::string("${DIRECT_ACTIONS}") == "true";'
          then:
            - homeassistant.action:
                action: climate.set_hvac_mode
                data:
                  entity_id: !lambda "return id(active_entity);"
                  hvac_mode: !lambda "return id(active_climate_mode);"

  - id: open_color_detail
    mode: restart
    then:
      - lambda: |-
          lv_label_set_text(id(color_detail_title), id(active_title).c_str());

          char buf[12];
          snprintf(buf, sizeof(buf), "%d %%", id(active_brightness_pct));
          lv_label_set_text(id(color_brightness_value), buf);
          lv_slider_set_value(id(color_brightness_slider), id(active_brightness_pct), LV_ANIM_OFF);

          bool show_tabs = id(active_supports_color) && id(active_supports_temperature);
          if (show_tabs) {
            lv_obj_clear_flag(id(color_mode_tabs), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(color_mode_tabs), LV_OBJ_FLAG_HIDDEN);
          }

          if (atoi("${DISPLAY_W}") < atoi("${DISPLAY_H}")) {
            int palette_y = show_tabs ? 96 : 76;
            lv_obj_set_size(id(color_palette_card), 150, 86);
            lv_obj_set_y(id(color_palette_card), palette_y);
            lv_obj_set_pos(id(color_preset_red), 13, 4);
            lv_obj_set_pos(id(color_preset_orange), 60, 4);
            lv_obj_set_pos(id(color_preset_yellow), 107, 4);
            lv_obj_set_pos(id(color_preset_green), 13, 52);
            lv_obj_set_pos(id(color_preset_blue), 60, 52);
            lv_obj_set_pos(id(color_preset_purple), 107, 52);

            lv_obj_set_size(id(temp_palette_card), 150, 126);
            lv_obj_set_y(id(temp_palette_card), palette_y);
            lv_obj_set_pos(id(temp_preset_2700), 44, 4);
            lv_obj_set_pos(id(temp_preset_4000), 44, 48);
            lv_obj_set_pos(id(temp_preset_6500), 44, 92);

            lv_obj_set_y(id(color_brightness_card), 256);
          } else {
            int palette_y = show_tabs ? 98 : 78;
            lv_obj_set_size(id(color_palette_card), 286, 48);
            lv_obj_set_y(id(color_palette_card), palette_y);
            lv_obj_set_pos(id(color_preset_red), 14, 8);
            lv_obj_set_pos(id(color_preset_orange), 61, 8);
            lv_obj_set_pos(id(color_preset_yellow), 108, 8);
            lv_obj_set_pos(id(color_preset_green), 155, 8);
            lv_obj_set_pos(id(color_preset_blue), 202, 8);
            lv_obj_set_pos(id(color_preset_purple), 249, 8);

            lv_obj_set_size(id(temp_palette_card), 286, 48);
            lv_obj_set_y(id(temp_palette_card), palette_y);
            lv_obj_set_pos(id(temp_preset_2700), 24, 8);
            lv_obj_set_pos(id(temp_preset_4000), 112, 8);
            lv_obj_set_pos(id(temp_preset_6500), 200, 8);

            lv_obj_set_y(id(color_brightness_card), 165);
          }

          id(active_color_detail_tab) = id(active_supports_color) ? 0 : 1;
      - lvgl.widget.hide: brightness_overlay
      - lvgl.widget.show: color_detail_overlay
      - script.execute:
          id: show_color_detail_tab
          tab: !lambda "return id(active_color_detail_tab);"

  - id: show_color_detail_tab
    mode: restart
    parameters:
      tab: int
    then:
      - lambda: |-
          if (tab == 0 && !id(active_supports_color) && id(active_supports_temperature)) {
            tab = 1;
          } else if (tab == 1 && !id(active_supports_temperature) && id(active_supports_color)) {
            tab = 0;
          }
          id(active_color_detail_tab) = tab;

          bool show_tabs = id(active_supports_color) && id(active_supports_temperature);
          if (show_tabs) {
            lv_obj_clear_flag(id(color_mode_tabs), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(color_mode_tabs), LV_OBJ_FLAG_HIDDEN);
          }

          if (tab == 0 && id(active_supports_color)) {
            lv_obj_clear_flag(id(color_palette_card), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(temp_palette_card), LV_OBJ_FLAG_HIDDEN);
            if (show_tabs) lv_obj_set_x(id(color_tab_indicator), 2);
          } else if (tab == 1 && id(active_supports_temperature)) {
            lv_obj_add_flag(id(color_palette_card), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(temp_palette_card), LV_OBJ_FLAG_HIDDEN);
            if (show_tabs) lv_obj_set_x(id(color_tab_indicator), 95);
          } else {
            lv_obj_add_flag(id(color_palette_card), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(temp_palette_card), LV_OBJ_FLAG_HIDDEN);
          }

          lv_obj_set_style_text_color(
            id(color_tab_label),
            id(active_supports_color) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x8E8E93),
            0
          );
          lv_obj_set_style_text_color(
            id(temp_tab_label),
            id(active_supports_temperature) ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x8E8E93),
            0
          );
          if (tab == 0 && id(active_supports_color)) {
            lv_obj_set_style_text_color(id(color_tab_label), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_text_color(id(temp_tab_label), lv_color_hex(0xD1D1D6), 0);
          } else if (tab == 1 && id(active_supports_temperature)) {
            lv_obj_set_style_text_color(id(color_tab_label), lv_color_hex(0xD1D1D6), 0);
            lv_obj_set_style_text_color(id(temp_tab_label), lv_color_hex(0xFFFFFF), 0);
          }

  - id: color_brightness_preview
    parameters:
      value: int
    then:
      - lambda: |-
          id(active_brightness_pct) = value;
          char buf[12];
          snprintf(buf, sizeof(buf), "%d %%", value);
          lv_label_set_text(id(color_brightness_value), buf);

  - id: color_brightness_commit
    parameters:
      value: int
    then:
      - lambda: 'id(active_brightness_pct) = value;'
      - if:
          condition:
            lambda: 'return std::string("${DIRECT_ACTIONS}") == "true";'
          then:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: !lambda "return id(active_entity);"
