  # ----------------------------------------------------------
  # do_tile_action
  #
  # Centralized handler for executing Home Assistant actions
  # triggered by tile taps.
  #
  # Parameters
  # - tile_type: light | fan | switch | scene | script | cover
  # - tap_action: auto | toggle | activate | fan_toggle_preset
  # - service: optional Home Assistant service override
  # - entity_id: target entity
  # - param_key / param_val: optional parameters for custom services
  # - was_on: previous entity state (pass false for longpress actions)
  #
  # Behavior
  #
  # toggle
  #   -> toggles the entity
  #   light.toggle / fan.toggle / switch.toggle / cover.open_cover|close_cover (based on was_on)
  #
  # activate
  #   -> activates entity
  #   scene.turn_on / script.turn_on / light.turn_on / fan.turn_on / cover.open_cover
  #
  # auto
  #   -> resolves automatically based on tile_type:
  #        light/switch/fan/cover -> toggle
  #        scene/script           -> activate
  #
  # fan_toggle_preset
  #   -> if fan was ON: fan.turn_off
  #   -> if fan was OFF:
  #        fan.turn_on
  #        wait 150ms
  #        fan.set_preset_mode(param_val)
  #
  # Custom service
  #   If "service" is set, it will be called directly.
  #   param_key / param_val may be used for parameters
  #   like preset_mode, brightness_pct, percentage, etc.
  # ----------------------------------------------------------
  - id: do_tile_action
    mode: queued
    parameters:
      tile_type: string
      tap_action: string
      service: string
      entity_id: string
      param_key: string
      param_val: string
      was_on: bool
    then:
      - if:
          condition:
            lambda: |-
              return std::string("${DIRECT_ACTIONS}") == "true";
          then:
            - lambda: |-
                ESP_LOGD("tile", "do_tile_action type=%s action=%s service=%s entity=%s key=%s val=%s was_on=%d",
                         tile_type.c_str(), tap_action.c_str(), service.c_str(), entity_id.c_str(),
                         param_key.c_str(), param_val.c_str(), (int)was_on);

            - if:
                condition:
                  lambda: |-
                    return tap_action == "fan_toggle_preset";
                then:
                  - if:
                      condition:
                        lambda: |-
                          return was_on;
                      then:
                        - homeassistant.action:
                            action: fan.turn_off
                            data:
                              entity_id: !lambda 'return entity_id;'
                      else:
                        - homeassistant.action:
                            action: fan.turn_on
                            data:
                              entity_id: !lambda 'return entity_id;'
                        - delay: 150ms
                        - homeassistant.action:
                            action: fan.set_preset_mode
                            data:
                              entity_id: !lambda 'return entity_id;'
                              preset_mode: !lambda 'return param_val;'

                else:
                  - if:
                      condition:
                        lambda: |-
                          std::string resolved = tap_action;
                          if (resolved == "auto") {
                            if (tile_type == "scene" || tile_type == "script") resolved = "activate";
                            else resolved = "toggle";
                          }
                          return resolved == "toggle";
                      then:
                        - if:
                            condition:
                              lambda: |-
                                return service.size() > 0;
                            then:
                              - homeassistant.action:
                                  action: !lambda 'return service;'
                                  data:
                                    entity_id: !lambda 'return entity_id;'
                            else:
                              - if:
                                  condition:
                                    lambda: |-
                                      return tile_type == "light";
                                  then:
                                    - homeassistant.action:
                                        action: light.toggle
                                        data:
                                          entity_id: !lambda 'return entity_id;'
                                  else:
                                    - if:
                                        condition:
                                          lambda: |-
                                            return tile_type == "fan";
                                        then:
                                          - homeassistant.action:
                                              action: fan.toggle
                                              data:
                                                entity_id: !lambda 'return entity_id;'
                                        else:
                                          - if:
                                              condition:
                                                lambda: |-
                                                  return tile_type == "switch";
                                              then:
                                                - homeassistant.action:
                                                    action: switch.toggle
                                                    data:
                                                      entity_id: !lambda 'return entity_id;'
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: |-
                                                        return tile_type == "cover";
                                                    then:
                                                      - homeassistant.action:
                                                          action: cover.set_cover_position
                                                          data:
                                                            entity_id: !lambda 'return entity_id;'
                                                            position: !lambda |-
                                                              return was_on ? 0 : 100;

                      else:
                        - if:
                            condition:
                              lambda: |-
                                std::string resolved = tap_action;
                                if (resolved == "auto") {
                                  if (tile_type == "scene" || tile_type == "script") resolved = "activate";
                                  else resolved = "toggle";
                                }
                                return resolved == "activate";
                            then:
                              - if:
                                  condition:
                                    lambda: |-
                                      return service.size() > 0;
                                  then:
                                    - if:
                                        condition:
                                          lambda: |-
                                            return param_key == "preset_mode";
                                        then:
                                          - homeassistant.action:
                                              action: !lambda 'return service;'
                                              data:
                                                entity_id: !lambda 'return entity_id;'
                                                preset_mode: !lambda 'return param_val;'
                                        else:
                                          - if:
                                              condition:
                                                lambda: |-
                                                  return param_key == "brightness_pct";
                                              then:
                                                - homeassistant.action:
                                                    action: !lambda 'return service;'
                                                    data:
                                                      entity_id: !lambda 'return entity_id;'
                                                      brightness_pct: !lambda 'return atoi(param_val.c_str());'
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: |-
                                                        return param_key == "percentage";
                                                    then:
                                                      - homeassistant.action:
                                                          action: !lambda 'return service;'
                                                          data:
                                                            entity_id: !lambda 'return entity_id;'
                                                            percentage: !lambda 'return atoi(param_val.c_str());'
                                                    else:
                                                      - homeassistant.action:
                                                          action: !lambda 'return service;'
                                                          data:
                                                            entity_id: !lambda 'return entity_id;'
                                  else:
                                    - if:
                                        condition:
                                          lambda: |-
                                            return tile_type == "scene";
                                        then:
                                          - homeassistant.action:
                                              action: scene.turn_on
                                              data:
                                                entity_id: !lambda 'return entity_id;'
                                        else:
                                          - if:
                                              condition:
                                                lambda: |-
                                                  return tile_type == "script";
                                              then:
                                                - homeassistant.action:
                                                    action: script.turn_on
                                                    data:
                                                      entity_id: !lambda 'return entity_id;'
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: |-
                                                        return tile_type == "light";
                                                    then:
                                                      - homeassistant.action:
                                                          action: light.turn_on
                                                          data:
                                                            entity_id: !lambda 'return entity_id;'
                                                    else:
                                                      - if:
                                                          condition:
                                                            lambda: |-
                                                              return tile_type == "fan";
                                                          then:
                                                            - homeassistant.action:
                                                                action: fan.turn_on
                                                                data:
                                                                  entity_id: !lambda 'return entity_id;'
                                                          else:
                                                            - if:
                                                                condition:
                                                                  lambda: |-
                                                                    return tile_type == "switch";
                                                                then:
                                                                  - homeassistant.action:
                                                                      action: switch.turn_on
                                                                      data:
                                                                        entity_id: !lambda 'return entity_id;'
                                                                else:
                                                                  - if:
                                                                      condition:
                                                                        lambda: |-
                                                                          return tile_type == "cover";
                                                                      then:
                                                                        - homeassistant.action:
                                                                            action: cover.open_cover
                                                                            data:
                                                                              entity_id: !lambda 'return entity_id;'

  - id: open_value_overlay
    parameters:
      title: string
      entity: string
      tile_type: string
      longpress_mode: string
      was_on: bool
      off_value: int
      brightness_value: float
      percentage_value: float
      position_value: float
      icon_text: string
      slider_bg_color: uint32_t
      slider_fill_color: uint32_t
      slider_icon_color: uint32_t
      label_off: string
      label_on: string
      supported_color_modes: string
      climate_current_temperature: float
      climate_target_temperature: float
      climate_humidity: float
      climate_mode: string
      climate_supported_modes: string
      climate_min_temp: string
      climate_max_temp: string
      climate_step: string
    then:
      - lambda: |-
          std::string mode = longpress_mode;
          auto contains_mode = [](const std::string& modes, const std::string& needle) {
            return modes.find(needle) != std::string::npos;
          };
          if (mode == "auto") {
            if (tile_type == "light") mode = "brightness";
            else if (tile_type == "fan") mode = "percentage";
            else if (tile_type == "cover") mode = "cover_position";
            else if (tile_type == "climate") mode = "climate_temperature";
            else mode = "none";
          }

          if (mode == "none") return;

          id(active_entity) = entity;
          id(active_value_suffix) = " %";
          id(active_label_off) = label_off;
          id(active_label_on) = label_on;
          id(active_title) = title;
          id(active_icon_text) = icon_text;
          id(active_supports_color) = false;
          id(active_supports_temperature) = false;
          lv_obj_add_flag(id(overlay_color_button), LV_OBJ_FLAG_HIDDEN);

          if (mode == "climate_temperature") {
            auto to_x10 = [](float value, int fallback) -> int {
              if (isnan(value)) return fallback;
              return (int) lround(value * 10.0f);
            };
            auto parse_x10 = [](const std::string& value, int fallback) -> int {
              if (value.empty()) return fallback;
              return (int) lround(atof(value.c_str()) * 10.0f);
            };
            id(active_control_kind) = "climate_temperature";
            id(active_climate_min_x10) = parse_x10(climate_min_temp, 50);
            id(active_climate_max_x10) = parse_x10(climate_max_temp, 300);
            id(active_climate_step_x10) = parse_x10(climate_step, 5);
            if (id(active_climate_step_x10) < 5) id(active_climate_step_x10) = 5;
            if (id(active_climate_max_x10) <= id(active_climate_min_x10)) {
              id(active_climate_min_x10) = 50;
              id(active_climate_max_x10) = 300;
            }

            id(active_climate_current_x10) = to_x10(climate_current_temperature, 0);
            int fallback_target = isnan(climate_current_temperature) ? 200 : id(active_climate_current_x10);
            id(active_climate_target_x10) = to_x10(climate_target_temperature, fallback_target);
            if (id(active_climate_target_x10) < id(active_climate_min_x10)) id(active_climate_target_x10) = id(active_climate_min_x10);
            if (id(active_climate_target_x10) > id(active_climate_max_x10)) id(active_climate_target_x10) = id(active_climate_max_x10);
            id(active_climate_target_x10) = id(active_climate_min_x10) + (int) lround((id(active_climate_target_x10) - id(active_climate_min_x10)) / (float) id(active_climate_step_x10)) * id(active_climate_step_x10);
            if (id(active_climate_target_x10) < id(active_climate_min_x10)) id(active_climate_target_x10) = id(active_climate_min_x10);
            if (id(active_climate_target_x10) > id(active_climate_max_x10)) id(active_climate_target_x10) = id(active_climate_max_x10);
            id(active_climate_humidity) = isnan(climate_humidity) ? -1 : (int) lround(climate_humidity);
            id(active_climate_mode) = climate_mode.empty() ? std::string("Auto") : climate_mode;
            id(active_climate_supported_modes) = climate_supported_modes;

            lv_label_set_text(id(climate_detail_title), title.c_str());

            char current_buf[48];
            if (isnan(climate_current_temperature)) {
              snprintf(current_buf, sizeof(current_buf), "Current: --");
            } else if (id(active_climate_humidity) >= 0) {
              snprintf(current_buf, sizeof(current_buf), "Current: %.1fВ° - Humidity: %d %%", climate_current_temperature, id(active_climate_humidity));
            } else {
              snprintf(current_buf, sizeof(current_buf), "Current: %.1fВ°", climate_current_temperature);
            }
            lv_label_set_text(id(climate_current_label), current_buf);

            char target_buf[16];
            snprintf(target_buf, sizeof(target_buf), "%.1fВ°", id(active_climate_target_x10) / 10.0f);
            lv_label_set_text(id(climate_target_label), target_buf);
            lv_label_set_text(id(climate_mode_label), id(active_climate_mode).c_str());

            lv_arc_set_range(id(climate_arc), id(active_climate_min_x10), id(active_climate_max_x10));
            lv_arc_set_value(id(climate_arc), id(active_climate_target_x10));

            if (atoi("${DISPLAY_W}") < atoi("${DISPLAY_H}")) {
              lv_obj_set_size(id(climate_arc), 196, 196);
              lv_obj_set_y(id(climate_arc), 8);
              lv_obj_set_y(id(climate_current_label), 48);
              lv_obj_set_y(id(climate_minus_button), -62);
              lv_obj_set_y(id(climate_plus_button), -62);
              lv_obj_set_y(id(climate_mode_pill), -18);
            } else {
              lv_obj_set_size(id(climate_arc), 176, 176);
              lv_obj_set_y(id(climate_arc), 18);
              lv_obj_set_y(id(climate_current_label), 40);
              lv_obj_set_y(id(climate_minus_button), -14);
              lv_obj_set_y(id(climate_plus_button), -14);
              lv_obj_set_y(id(climate_mode_pill), -15);
            }

            lv_obj_add_flag(id(brightness_overlay), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(climate_detail_overlay), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          int pct = off_value;

          if (mode == "brightness") {
            id(active_control_kind) = "light_brightness";
            if (was_on) {
              if (isnan(brightness_value)) pct = 100;
              else pct = (int) lround((brightness_value / 255.0f) * 100.0f);
            }
          } else if (mode == "percentage") {
            id(active_control_kind) = "fan_percentage";
            if (was_on) {
              if (isnan(percentage_value)) pct = 0;
              else pct = (int) lround(percentage_value);
            }
          } else if (mode == "cover_position") {
            id(active_control_kind) = "cover_position";
            if (isnan(position_value)) pct = was_on ? 100 : 0;
            else pct = (int) lround(position_value);
          } else {
            return;
          }

          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          id(active_brightness_pct) = pct;

          if (tile_type == "light" && std::string("${DIRECT_ACTIONS}") == "true") {
            id(active_supports_color) =
              contains_mode(supported_color_modes, "hs") ||
              contains_mode(supported_color_modes, "rgb") ||
              contains_mode(supported_color_modes, "rgbw") ||
              contains_mode(supported_color_modes, "rgbww") ||
              contains_mode(supported_color_modes, "xy");
            id(active_supports_temperature) = contains_mode(supported_color_modes, "color_temp");

            if (id(active_supports_color) || id(active_supports_temperature)) {
              lv_obj_clear_flag(id(overlay_color_button), LV_OBJ_FLAG_HIDDEN);
            }
          }

          if (tile_type == "cover") {
            lv_obj_set_style_bg_color(id(overlay_slider), lv_color_hex(slider_fill_color), LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(overlay_slider), lv_color_hex(slider_bg_color), LV_PART_INDICATOR);            
            lv_obj_set_style_bg_opa(id(overlay_slider), LV_OPA_COVER, LV_PART_MAIN);
          }
          else{
            lv_obj_set_style_bg_color(id(overlay_slider), lv_color_hex(slider_bg_color), LV_PART_MAIN);
            lv_obj_set_style_bg_color(id(overlay_slider), lv_color_hex(slider_fill_color), LV_PART_INDICATOR);            
            lv_obj_set_style_bg_opa(id(overlay_slider), LV_OPA_COVER, LV_PART_MAIN);
          }
          lv_obj_set_style_radius(id(overlay_slider), 28, LV_PART_MAIN);
          lv_obj_set_style_radius(id(overlay_slider), 0, LV_PART_INDICATOR);

          lv_label_set_text(id(overlay_title), title.c_str());
          lv_label_set_text(id(overlay_icon), icon_text.c_str());
          lv_slider_set_value(id(overlay_slider), pct, LV_ANIM_OFF);

          std::string value_text;

          if (tile_type == "cover") {
            if (pct <= 0) {
              value_text = label_off;
            } else if (pct >= 100) {
              value_text = label_on;
            } else {
              char buf[40];
              snprintf(buf, sizeof(buf), "%s - %d%%", label_on.c_str(), pct);
              value_text = buf;
            }
          } else {
            if (pct <= 0) {
              value_text = label_off;
            } else {
              char buf[20];
              snprintf(buf, sizeof(buf), "%d%s", pct, id(active_value_suffix).c_str());
              value_text = buf;
            }
          }

          lv_label_set_text(id(overlay_value), value_text.c_str());
          
          lv_obj_set_style_bg_opa(id(overlay_slider), LV_OPA_COVER, LV_PART_INDICATOR);

          lv_obj_set_style_text_color(id(overlay_icon), lv_color_hex(slider_icon_color), 0);

      - if:
          condition:
            lambda: 'return id(active_control_kind) != "climate_temperature";'
          then:
            - lvgl.widget.show: brightness_overlay

  # UI refresh (values + time + styles) + render
  - id: ui_refresh
    mode: queued
    then:
      - lambda: |-
          auto set_lbl = [](lv_obj_t* lbl, const std::string& s) {
            if (lbl) lv_label_set_text(lbl, s.c_str());
          };

          auto set_value_auto = [&](lv_obj_t* lbl,
                                    bool on,
                                    const std::string& tile_type,
                                    const std::string& value_mode,
                                    float brightness,
                                    float percentage,
                                    const std::string& preset,
                                    float climate_current_temperature,
                                    float climate_target_temperature,
                                    float climate_humidity,
                                    const std::string& label_on,
                                    const std::string& label_off) {
            std::string mode = value_mode;

            if (mode == "auto" || mode.empty()) {
              if (tile_type == "light") {
                mode = "brightness";
              } else if (tile_type == "fan") {
                mode = preset.empty() ? "percentage" : "preset";
              } else if (tile_type == "climate") {
                mode = "climate";
              } else {
                mode = "text";
              }
            }

            if (mode == "brightness") {
              if (!on) {
                set_lbl(lbl, label_off);
                return;
              }
              if (isnan(brightness)) {
                set_lbl(lbl, "100 %");
                return;
              }
              int pct = (int) lround((brightness / 255.0f) * 100.0f);
              char buf[8];
              snprintf(buf, sizeof(buf), "%d %%", pct);
              set_lbl(lbl, std::string(buf));
              return;
            }

            if (mode == "percentage") {
              if (!on) {
                set_lbl(lbl, label_off);
                return;
              }
              int pct = isnan(percentage) ? 0 : (int) lround(percentage);
              char buf[8];
              snprintf(buf, sizeof(buf), "%d %%", pct);
              set_lbl(lbl, std::string(buf));
              return;
            }

            if (mode == "preset") {
              if (!on) {
                set_lbl(lbl, label_off);
                return;
              }
              if (!preset.empty()) {
                set_lbl(lbl, preset);
              } else {
                set_lbl(lbl, label_on);
              }
              return;
            }

            if (mode == "climate") {
              if (!on) {
                set_lbl(lbl, label_off);
                return;
              }

              float temp = isnan(climate_target_temperature) ? climate_current_temperature : climate_target_temperature;
              if (isnan(temp)) {
                set_lbl(lbl, label_on);
                return;
              }

              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f В°", temp);
              set_lbl(lbl, std::string(buf));
              return;
            }

            if (mode == "text") {
              if (tile_type == "scene" || tile_type == "script") {
                set_lbl(lbl, label_on);
              } else {
                set_lbl(lbl, on ? label_on : label_off);
              }
              return;
            }

            set_lbl(lbl, "вҖ”");
          };

          auto is_active = [](const std::string& tile_type, const std::string& state) {
            if (tile_type == "climate") {
              return !state.empty() && state != "off" && state != "unavailable" && state != "unknown";
            }
            if (tile_type == "scene" || tile_type == "script") return true;
            return state == "on";
          };

          // Cover-aware active state: "closed" = off, anything else (open/opening/closing) = on
          bool t1_on = (std::string("${TILE1_TYPE}") == "cover") ? (id(tile1_cover_state).state != "closed") : is_active("${TILE1_TYPE}", std::string(id(ha_state_tile1).state.c_str()));
          bool t2_on = (std::string("${TILE2_TYPE}") == "cover") ? (id(tile2_cover_state).state != "closed") : is_active("${TILE2_TYPE}", std::string(id(ha_state_tile2).state.c_str()));
          bool t3_on = (std::string("${TILE3_TYPE}") == "cover") ? (id(tile3_cover_state).state != "closed") : is_active("${TILE3_TYPE}", std::string(id(ha_state_tile3).state.c_str()));
          bool t4_on = (std::string("${TILE4_TYPE}") == "cover") ? (id(tile4_cover_state).state != "closed") : is_active("${TILE4_TYPE}", std::string(id(ha_state_tile4).state.c_str()));
          bool t5_on = (std::string("${TILE5_TYPE}") == "cover") ? (id(tile5_cover_state).state != "closed") : is_active("${TILE5_TYPE}", std::string(id(ha_state_tile5).state.c_str()));
          bool t6_on = (std::string("${TILE6_TYPE}") == "cover") ? (id(tile6_cover_state).state != "closed") : is_active("${TILE6_TYPE}", std::string(id(ha_state_tile6).state.c_str()));

          set_value_auto(id(t1_value), t1_on, "${TILE1_TYPE}", "${TILE1_VALUE_MODE}",
                         id(tile1_brightness).state, id(tile1_percentage).state, std::string(id(tile1_preset).state.c_str()),
                         id(tile1_climate_current_temperature).state, id(tile1_climate_target_temperature).state, id(tile1_climate_humidity).state,
                         "${TILE1_LABEL_ON}", "${TILE1_LABEL_OFF}");

          set_value_auto(id(t2_value), t2_on, "${TILE2_TYPE}", "${TILE2_VALUE_MODE}",
                         id(tile2_brightness).state, id(tile2_percentage).state, std::string(id(tile2_preset).state.c_str()),
                         id(tile2_climate_current_temperature).state, id(tile2_climate_target_temperature).state, id(tile2_climate_humidity).state,
                         "${TILE2_LABEL_ON}", "${TILE2_LABEL_OFF}");

          set_value_auto(id(t3_value), t3_on, "${TILE3_TYPE}", "${TILE3_VALUE_MODE}",
                         id(tile3_brightness).state, id(tile3_percentage).state, std::string(id(tile3_preset).state.c_str()),
                         id(tile3_climate_current_temperature).state, id(tile3_climate_target_temperature).state, id(tile3_climate_humidity).state,
                         "${TILE3_LABEL_ON}", "${TILE3_LABEL_OFF}");

          set_value_auto(id(t4_value), t4_on, "${TILE4_TYPE}", "${TILE4_VALUE_MODE}",
                         id(tile4_brightness).state, id(tile4_percentage).state, std::string(id(tile4_preset).state.c_str()),
                         id(tile4_climate_current_temperature).state, id(tile4_climate_target_temperature).state, id(tile4_climate_humidity).state,
                         "${TILE4_LABEL_ON}", "${TILE4_LABEL_OFF}");

          set_value_auto(id(t5_value), t5_on, "${TILE5_TYPE}", "${TILE5_VALUE_MODE}",
                         id(tile5_brightness).state, id(tile5_percentage).state, std::string(id(tile5_preset).state.c_str()),
                         id(tile5_climate_current_temperature).state, id(tile5_climate_target_temperature).state, id(tile5_climate_humidity).state,
                         "${TILE5_LABEL_ON}", "${TILE5_LABEL_OFF}");

          set_value_auto(id(t6_value), t6_on, "${TILE6_TYPE}", "${TILE6_VALUE_MODE}",
                         id(tile6_brightness).state, id(tile6_percentage).state, std::string(id(tile6_preset).state.c_str()),
                         id(tile6_climate_current_temperature).state, id(tile6_climate_target_temperature).state, id(tile6_climate_humidity).state,
                         "${TILE6_LABEL_ON}", "${TILE6_LABEL_OFF}");

          if (id(active_control_kind) == "climate_temperature" && !lv_obj_has_flag(id(climate_detail_overlay), LV_OBJ_FLAG_HIDDEN)) {
            auto label_for_climate_mode = [](std::string mode) {
              for (char &c : mode) {
                if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
              }
              if (mode == "off") return std::string("Off");
              if (mode == "heat") return std::string("Heat");
              if (mode == "cool") return std::string("Cool");
              if (mode == "heat_cool") return std::string("Heat/Cool");
              if (mode == "auto") return std::string("Auto");
              if (mode == "dry") return std::string("Dry");
              if (mode == "fan_only") return std::string("Fan");
              return mode.empty() ? std::string("Auto") : mode;
            };
            auto sync_open_climate = [&](const std::string& entity,
                                         float current_temperature,
                                         float target_temperature,
                                         float humidity,
                                         const std::string& climate_mode) {
              if (id(active_entity) != entity) return;
              auto to_x10 = [](float value, int fallback) -> int {
                if (isnan(value)) return fallback;
                return (int) lround(value * 10.0f);
              };

              id(active_climate_current_x10) = to_x10(current_temperature, id(active_climate_current_x10));
              id(active_climate_humidity) = isnan(humidity) ? -1 : (int) lround(humidity);
              if (!climate_mode.empty()) {
                id(active_climate_mode) = climate_mode;
                lv_label_set_text(id(climate_mode_label), label_for_climate_mode(climate_mode).c_str());
              }

              int target_x10 = to_x10(target_temperature, id(active_climate_target_x10));
              if (target_x10 < id(active_climate_min_x10)) target_x10 = id(active_climate_min_x10);
              if (target_x10 > id(active_climate_max_x10)) target_x10 = id(active_climate_max_x10);
              int step_x10 = id(active_climate_step_x10);
              if (step_x10 < 5) step_x10 = 5;
              target_x10 = id(active_climate_min_x10) + (int) lround((target_x10 - id(active_climate_min_x10)) / (float) step_x10) * step_x10;
              if (target_x10 < id(active_climate_min_x10)) target_x10 = id(active_climate_min_x10);
              if (target_x10 > id(active_climate_max_x10)) target_x10 = id(active_climate_max_x10);
              id(active_climate_target_x10) = target_x10;

              char current_buf[48];
              if (isnan(current_temperature)) {
                snprintf(current_buf, sizeof(current_buf), "Current: --");
              } else if (id(active_climate_humidity) >= 0) {
                snprintf(current_buf, sizeof(current_buf), "Current: %.1fВ° - Humidity: %d %%", current_temperature, id(active_climate_humidity));
              } else {
                snprintf(current_buf, sizeof(current_buf), "Current: %.1fВ°", current_temperature);
              }
              lv_label_set_text(id(climate_current_label), current_buf);

              char target_buf[16];
              snprintf(target_buf, sizeof(target_buf), "%.1fВ°", id(active_climate_target_x10) / 10.0f);
              lv_label_set_text(id(climate_target_label), target_buf);
              lv_arc_set_value(id(climate_arc), id(active_climate_target_x10));
            };

            if (std::string("${TILE1_TYPE}") == "climate") sync_open_climate("${TILE1_ENTITY}", id(tile1_climate_current_temperature).state, id(tile1_climate_target_temperature).state, id(tile1_climate_humidity).state, std::string(id(tile1_climate_mode).state.c_str()));
            if (std::string("${TILE2_TYPE}") == "climate") sync_open_climate("${TILE2_ENTITY}", id(tile2_climate_current_temperature).state, id(tile2_climate_target_temperature).state, id(tile2_climate_humidity).state, std::string(id(tile2_climate_mode).state.c_str()));
            if (std::string("${TILE3_TYPE}") == "climate") sync_open_climate("${TILE3_ENTITY}", id(tile3_climate_current_temperature).state, id(tile3_climate_target_temperature).state, id(tile3_climate_humidity).state, std::string(id(tile3_climate_mode).state.c_str()));
            if (std::string("${TILE4_TYPE}") == "climate") sync_open_climate("${TILE4_ENTITY}", id(tile4_climate_current_temperature).state, id(tile4_climate_target_temperature).state, id(tile4_climate_humidity).state, std::string(id(tile4_climate_mode).state.c_str()));
            if (std::string("${TILE5_TYPE}") == "climate") sync_open_climate("${TILE5_ENTITY}", id(tile5_climate_current_temperature).state, id(tile5_climate_target_temperature).state, id(tile5_climate_humidity).state, std::string(id(tile5_climate_mode).state.c_str()));
            if (std::string("${TILE6_TYPE}") == "climate") sync_open_climate("${TILE6_ENTITY}", id(tile6_climate_current_temperature).state, id(tile6_climate_target_temperature).state, id(tile6_climate_humidity).state, std::string(id(tile6_climate_mode).state.c_str()));
          }

          {
            auto now = id(homeassistant_time).now();
            char buf[10];

            if (std::string("${TIME_24H}") == "true") {
              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            } else {
              int hour12 = now.hour % 12;
              if (hour12 == 0) hour12 = 12;
              snprintf(buf, sizeof(buf), "%d:%02d %s", hour12, now.minute, now.hour >= 12 ? "PM" : "AM");
            }

            set_lbl(id(lbl_time), std::string(buf));
          }

          auto apply_tile = [&](bool active,
                                lv_obj_t* tile,
                                lv_obj_t* circle,
                                lv_obj_t* title,
                                lv_obj_t* value,
                                lv_obj_t* icon_lbl,
                                uint32_t circle_active,
                                uint32_t circle_disabled,
                                uint32_t icon_active,
                                uint32_t icon_disabled,
                                uint32_t bg_active,
                                uint32_t bg_disabled,
                                uint32_t title_active,
                                uint32_t title_disabled,
                                uint32_t value_active,
                                uint32_t value_disabled)
          {
            lv_obj_set_style_bg_color(tile, lv_color_hex(active ? bg_active : bg_disabled), 0);
            lv_obj_set_style_bg_color(circle, lv_color_hex(active ? circle_active : circle_disabled), 0);
            lv_obj_set_style_text_color(icon_lbl, lv_color_hex(active ? icon_active : icon_disabled), 0);
            lv_obj_set_style_text_color(title, lv_color_hex(active ? title_active : title_disabled), 0);
            lv_obj_set_style_text_color(value, lv_color_hex(active ? value_active : value_disabled), 0);
          };

          apply_tile(t1_on,
                    id(tile1), id(tile1_icon_circle), id(t1_title), id(t1_value), id(tile1_icon_lbl),
                    ${TILE1_CIRCLE_ACTIVE_COLOR}, ${TILE1_CIRCLE_DISABLED_COLOR},
                    ${TILE1_ICON_ACTIVE_COLOR}, ${TILE1_ICON_DISABLED_COLOR},
                    ${TILE1_BG_ACTIVE_COLOR}, ${TILE1_BG_DISABLED_COLOR},
                    ${TILE1_TITLE_ACTIVE_COLOR}, ${TILE1_TITLE_DISABLED_COLOR},
                    ${TILE1_VALUE_ACTIVE_COLOR}, ${TILE1_VALUE_DISABLED_COLOR});

          apply_tile(t2_on,
                    id(tile2), id(tile2_icon_circle), id(t2_title), id(t2_value), id(tile2_icon_lbl),
                    ${TILE2_CIRCLE_ACTIVE_COLOR}, ${TILE2_CIRCLE_DISABLED_COLOR},
                    ${TILE2_ICON_ACTIVE_COLOR}, ${TILE2_ICON_DISABLED_COLOR},
                    ${TILE2_BG_ACTIVE_COLOR}, ${TILE2_BG_DISABLED_COLOR},
                    ${TILE2_TITLE_ACTIVE_COLOR}, ${TILE2_TITLE_DISABLED_COLOR},
                    ${TILE2_VALUE_ACTIVE_COLOR}, ${TILE2_VALUE_DISABLED_COLOR});

          apply_tile(t3_on,
                    id(tile3), id(tile3_icon_circle), id(t3_title), id(t3_value), id(tile3_icon_lbl),
                    ${TILE3_CIRCLE_ACTIVE_COLOR}, ${TILE3_CIRCLE_DISABLED_COLOR},
                    ${TILE3_ICON_ACTIVE_COLOR}, ${TILE3_ICON_DISABLED_COLOR},
                    ${TILE3_BG_ACTIVE_COLOR}, ${TILE3_BG_DISABLED_COLOR},
                    ${TILE3_TITLE_ACTIVE_COLOR}, ${TILE3_TITLE_DISABLED_COLOR},
                    ${TILE3_VALUE_ACTIVE_COLOR}, ${TILE3_VALUE_DISABLED_COLOR});

          apply_tile(t4_on,
                    id(tile4), id(tile4_icon_circle), id(t4_title), id(t4_value), id(tile4_icon_lbl),
                    ${TILE4_CIRCLE_ACTIVE_COLOR}, ${TILE4_CIRCLE_DISABLED_COLOR},
                    ${TILE4_ICON_ACTIVE_COLOR}, ${TILE4_ICON_DISABLED_COLOR},
                    ${TILE4_BG_ACTIVE_COLOR}, ${TILE4_BG_DISABLED_COLOR},
                    ${TILE4_TITLE_ACTIVE_COLOR}, ${TILE4_TITLE_DISABLED_COLOR},
                    ${TILE4_VALUE_ACTIVE_COLOR}, ${TILE4_VALUE_DISABLED_COLOR});

          apply_tile(t5_on,
                    id(tile5), id(tile5_icon_circle), id(t5_title), id(t5_value), id(tile5_icon_lbl),
                    ${TILE5_CIRCLE_ACTIVE_COLOR}, ${TILE5_CIRCLE_DISABLED_COLOR},
                    ${TILE5_ICON_ACTIVE_COLOR}, ${TILE5_ICON_DISABLED_COLOR},
                    ${TILE5_BG_ACTIVE_COLOR}, ${TILE5_BG_DISABLED_COLOR},
                    ${TILE5_TITLE_ACTIVE_COLOR}, ${TILE5_TITLE_DISABLED_COLOR},
                    ${TILE5_VALUE_ACTIVE_COLOR}, ${TILE5_VALUE_DISABLED_COLOR});

          apply_tile(t6_on,
                    id(tile6), id(tile6_icon_circle), id(t6_title), id(t6_value), id(tile6_icon_lbl),
                    ${TILE6_CIRCLE_ACTIVE_COLOR}, ${TILE6_CIRCLE_DISABLED_COLOR},
                    ${TILE6_ICON_ACTIVE_COLOR}, ${TILE6_ICON_DISABLED_COLOR},
                    ${TILE6_BG_ACTIVE_COLOR}, ${TILE6_BG_DISABLED_COLOR},
                    ${TILE6_TITLE_ACTIVE_COLOR}, ${TILE6_TITLE_DISABLED_COLOR},
                    ${TILE6_VALUE_ACTIVE_COLOR}, ${TILE6_VALUE_DISABLED_COLOR});

      - component.update: my_display
