            x: 11
            y: 14
            text: "${ROOM_NAME}"
            styles: style_room

        - label:
            id: lbl_time
            align: TOP_RIGHT
            x: -11
            y: 14
            text: ""
            styles: style_time

        # ---------- TILE 1 ----------
        - obj:
            id: tile1
            x: 9
            y: 54
            width: 147
            height: 52
            styles: style_tile
            scrollable: false
            scrollbar_mode: 'OFF'
            widgets:
              - obj:
                  id: tile1_icon_circle
                  x: 0
                  y: 0
                  width: 36
                  height: 36
                  styles: style_icon_circle
                  clickable: false
                  scrollable: false
                  scrollbar_mode: 'OFF'
                  widgets:
                    - label:
                        id: tile1_icon_lbl
                        align: CENTER
                        text_font: materialdesign_icons
                        text_color: 0xFFFFFF
                        text: "${TILE1_ICON}"
                        clickable: false
              - label:
                  id: t1_title
                  x: 48
                  y: 4
                  text: "${TILE1_TITLE}"
                  styles: style_title
                  clickable: false
              - label:
                  id: t1_value
                  x: 48
                  y: 18
                  text: "—"
                  styles: style_value
                  clickable: false
            on_short_click:
              - script.execute: { id: publish_action, action: "tile1_press" }
              - script.execute:
                  id: do_tile_action
                  tile_type: "${TILE1_TYPE}"
                  tap_action: "${TILE1_TAP_ACTION}"
                  service: "${TILE1_TAP_SERVICE}"
                  entity_id: "${TILE1_ENTITY}"
                  param_key: "${TILE1_TAP_PARAM_KEY}"
                  param_val: "${TILE1_TAP_PARAM_VAL}"
                  was_on: !lambda "return id(ha_state_tile1).state;"
            on_long_press:
              - if:
                  condition:
                    lambda: |-
                      std::string lp = "${TILE1_LONGPRESS}";
                      std::string type = "${TILE1_TYPE}";
                      if (lp == "none") return false;
                      if (lp == "auto") return (type == "light" || type == "fan");
                      return (lp == "brightness" || lp == "percentage");
                  then:
                    - script.execute:
