switch:
  - platform: restart
    name: "Restart"

# Two SPI buses:
# - lcd: display
# - my_touchscreen: touch controller
spi:
  - id: lcd
    clk_pin: 18
    mosi_pin: 23
    miso_pin: 19

  - id: my_touchscreen
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 35

output:
  - platform: ledc
    pin: 4
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Power Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

# Touchscreen configuration (XPT2046)
# IMPORTANT:
# - calibration values are device-specific
# - touchscreen.transform must match display.transform exactly
touchscreen:
  platform: xpt2046
  id: ts_touch
  spi_id: my_touchscreen
  cs_pin: 33
  interrupt_pin: 34
  update_interval: 20ms
  threshold: 300

  calibration:
    x_min: 280
    x_max: 3860
    y_min: 340
    y_max: 3860

  transform:
    swap_xy: true
    mirror_x: false
    mirror_y: false
  
  on_touch:
    - lambda: |-
        id(last_touch_ms) = millis();

# Display configuration (ILI9341)
display:
  - platform: ili9xxx
    id: my_display
    spi_id: lcd
    model: ILI9341
    color_palette: 8BIT
    cs_pin: 27
    dc_pin: 26
    reset_pin: 16
    invert_colors: false
    update_interval: never
    auto_clear_enabled: false

    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false

    dimensions:
      width: 320
      height: 240

lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: ts_touch

  style_definitions:
    - id: style_tile
