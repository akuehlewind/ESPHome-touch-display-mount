esphome:
  name: smartdisplay
  friendly_name: SmartDisplay
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(last_touch_ms) = millis();
          id(display_dimmed) = false;
      - light.turn_on:
          id: back_light
          brightness: !lambda "return atoi(\"${MAX_BRIGHTNESS}\") / 100.0f;"
      - script.execute: ui_refresh

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: "CHANGE_ME"   # set your own 32-character encryption key

ota:
  - platform: esphome
    password: "CHANGE_ME" # set your own OTA password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Smartdisplay Fallback Hotspot"
    password: "CHANGE_ME" # set your own fallback hotspot password

captive_portal:

# ============================================================
# No need to edit down here
# The Material Design Icons font is included at fonts/materialdesignicons-webfont.ttf (Apache 2.0).
# Source: https://github.com/Templarian/MaterialDesign-Webfont
# ============================================================

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              if (std::string("${AUTO_DIM}") != "true") return false;
              if (id(display_dimmed)) return false;
              return (millis() - id(last_touch_ms)) > (atoi("${AUTO_DIM_TIMEOUT}") * 1000UL);
          then:
            - script.execute: dim_display

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: ui_refresh

      - seconds: 0
        minutes: 0
        hours: ${NIGHT_START_HOUR}
        then:
          - if:
              condition:
                lambda: 'return id(display_dimmed);'
              then:
                - script.execute: dim_display

      - seconds: 0
        minutes: 0
        hours: ${NIGHT_END_HOUR}
        then:
          - if:
              condition:
                lambda: 'return id(display_dimmed);'
              then:
                - script.execute: dim_display

globals:
  - id: active_entity
    type: std::string
    restore_value: no

  - id: active_control_kind
    type: std::string
    restore_value: no

  - id: active_value_suffix
    type: std::string
    restore_value: no

  - id: overlay_slider_bg_color
    type: uint32_t
    restore_value: no
    initial_value: '0x939391'

  - id: overlay_slider_fill_color
    type: uint32_t
    restore_value: no
    initial_value: '0xFEC600'

  - id: last_touch_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: display_dimmed
    type: bool
    restore_value: no
    initial_value: 'false'

